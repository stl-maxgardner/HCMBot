name: HCM Slackbot Poller

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll-slack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Skip notice when poller secrets are missing
        if: ${{ !(secrets.SLACK_BOT_TOKEN != '' && secrets.OPENAI_API_KEY != '' && vars.HCM_CHANNEL_IDS != '') }}
        run: |
          echo "Skipping HCM poller run."
          echo "Set GitHub Actions secrets/vars to enable:"
          echo "  - secrets.SLACK_BOT_TOKEN"
          echo "  - secrets.OPENAI_API_KEY"
          echo "  - vars.HCM_CHANNEL_IDS"

      - name: Run Slack poller
        if: ${{ secrets.SLACK_BOT_TOKEN != '' && secrets.OPENAI_API_KEY != '' && vars.HCM_CHANNEL_IDS != '' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          HCM_DB_PATH: kb/hcm_kb.sqlite
          HCM_CHANNEL_IDS: ${{ vars.HCM_CHANNEL_IDS }}
        run: python tools/hcm_slackbot_poll.py
